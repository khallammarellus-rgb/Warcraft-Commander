# Cloudflare Pages — static campaign KML + landing page
# Build output: portal/dist (generated by scripts/publish_portal_site.py)
#
# First-time setup:
#   cd portal && npm install
#   npx wrangler login
#   npm run deploy
#
# Or from project root:
#   python3 scripts/publish_portal_site.py --deploy

name = "wow-commander-campaign"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

[vars]
WOW_COMMANDER_PORTAL = "tier2-pages"