# Cloudflare Pages + Functions — WoW Commander campaign portal
# Build: python3 scripts/publish_portal_site.py --all-games
# Deploy: python3 scripts/publish_portal_site.py --deploy --all-games
#
# Secrets (wrangler secret put …):
#   ORGANIZER_SECRET, SESSION_SECRET, GEMINI_API_KEY, DISCORD_WEBHOOK_URL
#   TOKEN_TABLE_01_BLUE, TOKEN_TABLE_01_RED, ASSISTANT_PASSWORD_TABLE_01, …
#   GITHUB_MERGE_DISPATCH_TOKEN, GITHUB_REPO (auto merge via GitHub Actions)
#   MERGE_RUNNER_WEBHOOK_URL (optional generic merge runner webhook)
#   AUTO_MERGE_ON_UPLOAD=false (optional — disable auto-queue on board upload)

name = "wow-commander-campaign"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

[vars]
WOW_COMMANDER_PORTAL = "tier3-portal"
GEMINI_MODEL = "gemini-3.1-flash-lite"
# R2 free tier = 10 GB; portal hard-stops at 9.5 GB (see functions/lib/storage_quota.ts)
STORAGE_HARD_CAP_GB = "9.5"

[[kv_namespaces]]
binding = "PORTAL_KV"
id = "f05e6d02a5d04691a36a21e8048c46f5"

[[r2_buckets]]
binding = "TURNS_BUCKET"
bucket_name = "wow-commander-turns"