name: Poll portal merge jobs

# Primary merge runner — no repository_dispatch token required on Cloudflare Pages.
# Polls pending jobs every 3 minutes and runs merge + deploy when uploads queue work.

on:
  schedule:
    - cron: "*/3 * * * *"
  workflow_dispatch:

concurrency:
  group: merge-portal-poll
  cancel-in-progress: false

jobs:
  poll-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install portal deps (wrangler)
        run: npm ci
        working-directory: portal

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Process pending merge jobs
        env:
          ORGANIZER_SECRET: ${{ secrets.PORTAL_ORGANIZER_SECRET }}
          PORTAL_ORIGIN: ${{ vars.PORTAL_ORIGIN || 'https://wow-commander-campaign.pages.dev' }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python3 scripts/merge_runner_daemon.py --once